<!DOCTYPE html>
<html>
<head>
<title>My Movie List</title>

<style>
body{
    font-family: Arial;
    background-color: lightgray;
}

.box{
    background:white;
    width:300px;
    margin:auto;
    padding:15px;
    border:1px solid black;
}

input,select{
    width:100%;
    margin-bottom:10px;
}

.star{
    font-size:22px;
    cursor:pointer;
    color:gray;
}

.gold{
    color:gold;
}

.movie{
    border:1px solid gray;
    margin-top:10px;
    padding:5px;
}
</style>
</head>

<body>

<div class="box">

<h2>Movie List</h2>

Title:<br>
<input id="title">

Year:<br>
<input id="year">

Genre:<br>
<select id="genre">
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Horror</option>
</select>

Rating:<br>

<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>

<br><br>

<button onclick="addMovie()">Add Movie</button>

<h3>Movies</h3>
<div id="list"></div>

</div>

<script>

var rating = 0;

function rate(num){

    rating = num;

    var stars = document.getElementsByClassName("star");

    for(var i=0;i<stars.length;i++){
        stars[i].classList.remove("gold");
    }

    for(var i=0;i<num;i++){
        stars[i].classList.add("gold");
    }
}

function addMovie(){

    var title = document.getElementById("title").value;
    var year = document.getElementById("year").value;
    var genre = document.getElementById("genre").value;

    if(title=="" || year=="" || rating==0){
        alert("Fill everything first");
        return;
    }

    var movies = JSON.parse(localStorage.getItem("movies"));

    if(movies == null){
        movies = [];
    }

    var found = false;

    for(var i=0;i<movies.length;i++){

        if(movies[i].title.toLowerCase() == title.toLowerCase()){

            movies[i].rating = Math.round((movies[i].rating + rating) / 2);
            movies[i].year = year;
            movies[i].genre = genre;

            found = true;
        }
    }

    if(!found){

        var movie = {
            title:title,
            year:year,
            genre:genre,
            rating:rating
        };

        movies.push(movie);
    }

    localStorage.setItem("movies", JSON.stringify(movies));

    document.getElementById("title").value="";
    document.getElementById("year").value="";
    rating=0;

    var stars = document.getElementsByClassName("star");
    for(var i=0;i<stars.length;i++){
        stars[i].classList.remove("gold");
    }

    showMovies();
}

function showMovies(){

    var list = document.getElementById("list");
    list.innerHTML="";

    var movies = JSON.parse(localStorage.getItem("movies"));

    if(movies == null){
        return;
    }

    for(var i=0;i<movies.length;i++){

        var div = document.createElement("div");
        div.className="movie";

        var stars="";

        for(var s=0;s<movies[i].rating;s++){
            stars += "★";
        }

        div.innerHTML =
        movies[i].title + " (" + movies[i].year + ") - " +
        movies[i].genre + " Rating: " + stars +
        "<br><button onclick='deleteMovie("+i+")'>Delete</button>";

        list.appendChild(div);
    }
}

function deleteMovie(index){

    if(confirm("Are you sure you want to delete this movie?")){

        var movies = JSON.parse(localStorage.getItem("movies"));

        movies.splice(index,1);

        localStorage.setItem("movies", JSON.stringify(movies));

        showMovies();
    }
}

showMovies();

</script>

</body>
</html>
